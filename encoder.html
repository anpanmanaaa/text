<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LINE OGP Link Encoder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0a0f;
  --panel:  #0d0d14;
  --border: #7fffb230;
  --accent: #7fffb2;
  --accent2:#ff7f50;
  --dim:    #7fffb260;
  --text:   #e0ffe8;
  --app-font: 'Space Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--app-font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── menubar ── */
.menubar {
  height: 26px;
  background: #111118;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  font-size: 11px;
  color: var(--dim);
  user-select: none;
}
.menubar .traffic {
  display: flex; gap: 5px; margin-right: 6px;
}
.traffic span {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block;
}
.traffic .r { background: #ff5f57; }
.traffic .y { background: #ffbd2e; }
.traffic .g { background: #28c840; }

.menubar .menu-item {
  cursor: pointer;
  padding: 0 4px;
  transition: color .15s;
}
.menubar .menu-item:hover { color: var(--accent); }

.menubar .title {
  flex: 1; text-align: center;
  font-size: 10px; letter-spacing: .12em;
  color: var(--dim);
}

/* ── main layout ── */
.app {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem 4rem;
  gap: 2.5rem;
}

.header {
  text-align: center;
}
.header h1 {
  font-size: 1rem;
  letter-spacing: .25em;
  color: var(--accent);
  text-transform: uppercase;
}
.header p {
  margin-top: .5rem;
  font-size: .65rem;
  color: var(--dim);
  letter-spacing: .12em;
}

/* ── card ── */
.card {
  width: 100%;
  max-width: 620px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 1.8rem 2rem;
}

.card-title {
  font-size: .6rem;
  letter-spacing: .2em;
  color: var(--dim);
  margin-bottom: .8rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.card-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* config row */
.cfg-row {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
}
.cfg-group {
  display: flex;
  flex-direction: column;
  gap: .4rem;
  flex: 1;
  min-width: 160px;
}
label {
  font-size: .58rem;
  letter-spacing: .15em;
  color: var(--dim);
}
input[type="text"], select {
  background: #13131d;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--app-font);
  font-size: .75rem;
  padding: .5rem .7rem;
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
input[type="text"]:focus, select:focus {
  border-color: var(--accent);
}
select option { background: #13131d; }

/* textarea */
textarea {
  width: 100%;
  background: #13131d;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--app-font);
  font-size: .85rem;
  padding: .8rem;
  resize: vertical;
  min-height: 90px;
  outline: none;
  line-height: 1.6;
  transition: border-color .2s;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--dim); }

/* encode btn */
.btn-row {
  margin-top: 1rem;
  display: flex;
  gap: .8rem;
  flex-wrap: wrap;
}
button {
  font-family: var(--app-font);
  font-size: .7rem;
  letter-spacing: .15em;
  cursor: pointer;
  padding: .55rem 1.2rem;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  text-transform: uppercase;
  transition: background .15s, color .15s;
}
button:hover {
  background: var(--accent);
  color: var(--bg);
}
button.danger {
  border-color: var(--accent2);
  color: var(--accent2);
}
button.danger:hover {
  background: var(--accent2);
  color: var(--bg);
}

/* ── output ── */
.output-card {
  width: 100%;
  max-width: 620px;
  display: none;
}
.output-card.visible { display: block; }

.result-url {
  background: #13131d;
  border: 1px solid var(--border);
  padding: .8rem;
  font-size: .72rem;
  color: var(--accent);
  word-break: break-all;
  line-height: 1.6;
  position: relative;
}
.copy-badge {
  position: absolute;
  top: .5rem; right: .5rem;
  font-size: .55rem;
  letter-spacing: .1em;
  color: var(--bg);
  background: var(--accent);
  padding: 2px 6px;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.copy-badge.show { opacity: 1; }

.encoded-raw {
  margin-top: .6rem;
  font-size: .6rem;
  color: var(--dim);
  word-break: break-all;
}

/* decode section */
.sep {
  width: 100%; max-width: 620px;
  border: none;
  border-top: 1px solid var(--border);
}

/* history */
.history-list {
  width: 100%;
  max-width: 620px;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.hist-item {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: .7rem .9rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: .8rem;
  font-size: .7rem;
  cursor: pointer;
  transition: border-color .15s;
}
.hist-item:hover { border-color: var(--accent); }
.hist-text { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-enc  { color: var(--dim); font-size: .58rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-copy { color: var(--accent2); font-size: .58rem; white-space: nowrap; }

/* notification */
.notif {
  position: fixed;
  bottom: 1.5rem; right: 1.5rem;
  background: var(--accent);
  color: var(--bg);
  font-size: .65rem;
  letter-spacing: .12em;
  padding: .5rem 1rem;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  z-index: 999;
}
.notif.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
<body>

<div class="menubar">
  <div class="traffic">
    <span class="r"></span><span class="y"></span><span class="g"></span>
  </div>
  <span class="menu-item">File</span>
  <span class="menu-item">Edit</span>
  <span class="menu-item" onclick="toggleHistory()">History</span>
  <div class="title">LINE OGP ENCODER — v1.0</div>
</div>

<div class="app">

  <div class="header">
    <h1>OGP Link Encoder</h1>
    <p>テキストを base64url / hex エンコードして LINE プレビューに表示するリンクを生成</p>
  </div>

  <!-- ── Config ── -->
  <div class="card">
    <div class="card-title">CONFIG</div>
    <div class="cfg-row">
      <div class="cfg-group">
        <label>エンコード方式</label>
        <select id="encMode" onchange="save(); reEncode()">
          <option value="b64url">base64url (推奨)</option>
          <option value="hex">hex (16進数)</option>
          <option value="pct">percent-encode</option>
        </select>
      </div>
      <div class="cfg-group" style="justify-content:flex-end">
        <label>Worker</label>
        <div style="font-size:.65rem;color:var(--accent);padding:.5rem .7rem;background:#13131d;border:1px solid var(--border)">proud-mode-cd1a.a6068376.workers.dev</div>
      </div>
    </div>
  </div>

  <!-- ── Encode ── -->
  <div class="card">
    <div class="card-title">ENCODE</div>
    <textarea id="msgInput" placeholder="LINEに表示したいメッセージを入力..." oninput="reEncode()"></textarea>
    <div class="btn-row">
      <button onclick="doEncode()">Generate Link</button>
      <button class="danger" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- ── Output ── -->
  <div class="output-card" id="outputCard">
    <div class="card">
      <div class="card-title">GENERATED LINK</div>
      <div style="position:relative">
        <div class="result-url" id="resultUrl"></div>
        <div class="copy-badge" id="copyBadge">COPIED!</div>
      </div>
      <div class="encoded-raw" id="encodedRaw"></div>
      <div class="btn-row" style="margin-top:.9rem">
        <button onclick="copyLink()">Copy Link</button>
        <button onclick="openLink()">Open in Browser</button>
      </div>
    </div>
  </div>

  <hr class="sep">

  <!-- ── Decode ── -->
  <div class="card">
    <div class="card-title">DECODE (確認用)</div>
    <input type="text" id="decInput" placeholder="エンコード文字列を貼り付けて確認..." oninput="doDecode()">
    <div id="decResult" style="margin-top:.8rem;font-size:.75rem;color:var(--accent);min-height:1.2rem;word-break:break-all"></div>
  </div>

  <!-- ── History ── -->
  <div class="card" id="historyCard" style="display:none">
    <div class="card-title">HISTORY</div>
    <div class="history-list" id="historyList"></div>
    <div class="btn-row"><button class="danger" onclick="clearHistory()">Clear History</button></div>
  </div>

</div>

<!-- notification -->
<div class="notif" id="notif"></div>

<script>
// ─── state ───────────────────────────────────────────────
let currentEncoded = "";
let currentLink    = "";
const STORAGE_KEY  = "ogp_encoder_cfg";
const HIST_KEY     = "ogp_encoder_hist";

// ─── persist ─────────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    encMode: document.getElementById("encMode").value,
  }));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    if (d.encMode) document.getElementById("encMode").value = d.encMode;
  } catch {}
}

// ─── encode ──────────────────────────────────────────────
function encodeMsg(text, mode) {
  if (mode === "b64url") {
    // TextEncoder → base64url
    const bytes = new TextEncoder().encode(text);
    let bin = "";
    bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin)
      .replace(/\+/g, "-")
      .replace(/\//g, "_")
      .replace(/=+$/, "");
  }
  if (mode === "hex") {
    return Array.from(new TextEncoder().encode(text))
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");
  }
  if (mode === "pct") {
    return encodeURIComponent(text);
  }
  return text;
}

function decodeMsg(enc, mode) {
  try {
    if (mode === "b64url") {
      let b64 = enc.replace(/-/g, "+").replace(/_/g, "/");
      while (b64.length % 4) b64 += "=";
      const bin = atob(b64);
      const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }
    if (mode === "hex") {
      const bytes = enc.match(/.{1,2}/g).map(h => parseInt(h, 16));
      return new TextDecoder().decode(new Uint8Array(bytes));
    }
    if (mode === "pct") {
      return decodeURIComponent(enc);
    }
  } catch { return "— decode error —"; }
}

function getMode() { return document.getElementById("encMode").value; }
function getBase() { return "https://proud-mode-cd1a.a6068376.workers.dev"; }

// ─── actions ─────────────────────────────────────────────
function reEncode() {
  const msg = document.getElementById("msgInput").value;
  if (!msg.trim()) { document.getElementById("outputCard").classList.remove("visible"); return; }
  const enc  = encodeMsg(msg, getMode());
  const base = getBase();
  if (!base) return;
  currentEncoded = enc;
  currentLink    = base + "/" + enc;
  document.getElementById("resultUrl").textContent  = currentLink;
  document.getElementById("encodedRaw").textContent = "encoded: " + enc + "  [" + getMode() + "]";
  document.getElementById("outputCard").classList.add("visible");
}

function doEncode() {
  const msg = document.getElementById("msgInput").value.trim();
  if (!msg) { notify("メッセージを入力してください"); return; }
  reEncode();
  // save history
  const hist = getHistory();
  const entry = { msg, enc: currentEncoded, link: currentLink, mode: getMode(), ts: Date.now() };
  const deduped = hist.filter(h => h.enc !== currentEncoded);
  deduped.unshift(entry);
  localStorage.setItem(HIST_KEY, JSON.stringify(deduped.slice(0, 20)));
  renderHistory();
  notify("リンク生成完了！");
}

function clearAll() {
  document.getElementById("msgInput").value = "";
  document.getElementById("outputCard").classList.remove("visible");
  currentEncoded = ""; currentLink = "";
}

function copyLink() {
  if (!currentLink) return;
  navigator.clipboard.writeText(currentLink).then(() => {
    const b = document.getElementById("copyBadge");
    b.classList.add("show");
    setTimeout(() => b.classList.remove("show"), 1800);
    notify("コピーしました");
  });
}

function openLink() {
  if (currentLink) window.open(currentLink, "_blank");
}

// ─── decode panel ─────────────────────────────────────────
function doDecode() {
  const enc = document.getElementById("decInput").value.trim();
  if (!enc) { document.getElementById("decResult").textContent = ""; return; }
  const decoded = decodeMsg(enc, getMode());
  document.getElementById("decResult").textContent = "→ " + decoded;
}

// ─── history ─────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || "[]"); } catch { return []; }
}
function toggleHistory() {
  const card = document.getElementById("historyCard");
  card.style.display = card.style.display === "none" ? "block" : "none";
  if (card.style.display === "block") renderHistory();
}
function clearHistory() {
  localStorage.removeItem(HIST_KEY);
  renderHistory();
  notify("履歴を削除しました");
}
function renderHistory() {
  const list = document.getElementById("historyList");
  const hist = getHistory();
  if (!hist.length) { list.innerHTML = '<div style="font-size:.65rem;color:var(--dim)">履歴なし</div>'; return; }
  list.innerHTML = hist.map((h, i) => `
    <div class="hist-item" onclick="loadHist(${i})">
      <div class="hist-text">${escHtml(h.msg)}</div>
      <div class="hist-enc">${escHtml(h.enc.slice(0, 24))}…</div>
      <div class="hist-copy" onclick="event.stopPropagation();copyText('${escHtml(h.link)}')">COPY</div>
    </div>
  `).join("");
}
function loadHist(i) {
  const h = getHistory()[i];
  document.getElementById("msgInput").value = h.msg;
  document.getElementById("encMode").value  = h.mode;
  reEncode();
}
function copyText(s) {
  navigator.clipboard.writeText(s).then(() => notify("コピーしました"));
}

// ─── notify ──────────────────────────────────────────────
function notify(msg) {
  const el = document.getElementById("notif");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── init ─────────────────────────────────────────────────
load();
renderHistory();
</script>
</body>
</html>
